resources:
- ../../base

namespace: hello-world-dev

replicas:
- name: hello-world
  count: 1

patches:
- target:
    kind: Ingress
    name: hello-world-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: dev.hello-world.local

- target:
    kind: Deployment
    name: hello-world
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: dev